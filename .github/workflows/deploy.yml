name: Deploy to cPanel (orders.kebbazone.com)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_DEFAULT_BRANCH: ${{ secrets.VITE_DEFAULT_BRANCH }}
          VITE_READY_TIMEOUT_MINUTES: ${{ secrets.VITE_READY_TIMEOUT_MINUTES }}
          VITE_SCAN_COOLDOWN_MS: ${{ secrets.VITE_SCAN_COOLDOWN_MS }}

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./dist/
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
